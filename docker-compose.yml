# GuinéaManager ERP - Docker Compose Production Configuration
# Complete ERP solution for West African SMEs

services:
  # ==========================================
  # MAIN APPLICATION (All-in-One)
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guineamanager
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      # Core
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
      - JWT_SECRET=${JWT_SECRET:-guineamanager-change-this-secret-in-production}
      - NEXT_PUBLIC_API_URL=/api
      - BACKEND_URL=http://localhost:3001
      
      # Application URL (change for your domain)
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      
      # Email (optional - for notifications)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      
      # Mobile Money - Orange Money (optional)
      - ORANGE_MONEY_CLIENT_ID=${ORANGE_MONEY_CLIENT_ID:-}
      - ORANGE_MONEY_CLIENT_SECRET=${ORANGE_MONEY_CLIENT_SECRET:-}
      
      # Mobile Money - MTN Money (optional)
      - MTN_MONEY_SUBSCRIPTION_KEY=${MTN_MONEY_SUBSCRIPTION_KEY:-}
      - MTN_MONEY_API_KEY=${MTN_MONEY_API_KEY:-}
      
      # Push notifications (optional)
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      
      # Redis (optional - for caching)
      - REDIS_URL=${REDIS_URL:-}
      
    volumes:
      # Persist database
      - guineamanager-data:/app/data
      # Persist uploads
      - guineamanager-uploads:/app/uploads
      
    networks:
      - guineamanager-network
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

